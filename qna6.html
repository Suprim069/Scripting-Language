//Multiplication Table using Prompt dialogue box.
<!DOCTYPE html>
<html>
<body>

<script>
    // Ask the user to enter a number
    let num = prompt("Enter a number:");

    // Display the multiplication table of the entered number
    for(let i = 1; i <= 10; i++) {
        document.write(`${num} x ${i} = ${num * i}<br>`);
    }
</script>

</body>
</html>
