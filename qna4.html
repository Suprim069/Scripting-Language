//Check even or odd number.
<!DOCTYPE html>
<html>
<body>

<script>
    // Store a number
    let num = 40;

    // Check whether the number is even or odd
    if (num % 2 == 0) {
        document.write(num + " is Even");
    } else {
        document.write(num + " is Odd");
    }
</script>

</body>
</html>
